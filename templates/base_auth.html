{% extends "base.html" %}

{% block body %}
<div class="auth-container">
    <div class="auth-card">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% block auth_content %}{% endblock %}
    </div>
</div>
{% endblock %}
